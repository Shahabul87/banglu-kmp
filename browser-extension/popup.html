<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <title>Banglu</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="" width="22" height="22" />
    <span class="brand">বাংলু</span>
    <span class="status" id="status">লোড হচ্ছে…</span>
  </header>
  <div id="gettingStarted" class="getting-started" hidden>
    <div class="gs-head">
      <span>৩ ধাপে শুরু করুন</span>
      <button id="gsClose" aria-label="বন্ধ করুন">✕</button>
    </div>
    <ol class="gs-steps">
      <li>১. যেকোনো ওয়েবসাইটের লেখার ঘরে ক্লিক করুন</li>
      <li>২. ইংরেজি অক্ষরে লিখুন — kemon acho → কেমন আছো</li>
      <li>৩. এই পপআপেও সরাসরি কনভার্ট করতে পারেন</li>
    </ol>
  </div>
  <textarea id="in" placeholder="ekhane english okkhore likhun…" autofocus></textarea>
  <div id="chips"></div>
  <div class="out-card">
    <div class="out-head">
      <span>বাংলা আউটপুট</span>
      <button id="copy">কপি</button>
    </div>
    <div id="out">…</div>
  </div>
  <footer>
    সম্পূর্ণ অফলাইন — কিছুই কোথাও পাঠানো হয় না ·
    <a href="https://play.google.com/store/apps/details?id=com.banglu.keyboard" target="_blank">Android কীবোর্ড</a>
  </footer>
  <script type="module" src="popup.js"></script>
</body>
</html>
