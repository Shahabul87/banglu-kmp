<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D5AFE"/>
      <stop offset="100%" style="stop-color:#2979FF"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Bengali letter বা (Ba) - stylized -->
  <text x="256" y="320" 
        font-family="Noto Sans Bengali, sans-serif" 
        font-size="280" 
        font-weight="700"
        fill="white" 
        text-anchor="middle" 
        dominant-baseline="middle">বা</text>
  
  <!-- Subtle keyboard dots at bottom -->
  <circle cx="180" cy="430" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="220" cy="430" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="260" cy="430" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="300" cy="430" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="340" cy="430" r="8" fill="rgba(255,255,255,0.4)"/>
</svg>
